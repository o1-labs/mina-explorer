# nginx config for the mina-explorer container.
# - Listens on 8080 (rootless-friendly; matches nginx-unprivileged default)
# - SPA fallback to /index.html for client-side routing
# - No-cache on /index.html and /config.js so deployments and runtime config
#   overrides are picked up on every load
# - Long-lived immutable cache on /assets/* (vite emits hash-suffixed filenames)

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hash-suffixed assets — safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Runtime config — must NOT be cached so MINA_EXPLORER_* env var changes
    # take effect on the next page load after a container restart
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # The SPA entry point — never cache, the JS bundle hash is what changes
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback: any unknown path serves index.html so the client router
    # can take over (HashRouter URLs work, but direct /accounts paths would
    # otherwise 404)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
